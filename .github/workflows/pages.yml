name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Add a PAGES_TOKEN secret with Pages write/admin access to let this
      # workflow enable GitHub Pages automatically on a first deployment.
      PAGES_TOKEN_CONFIGURED: ${{ secrets.PAGES_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm run check
      - run: npm run build
      - name: Enable and configure Pages
        if: env.PAGES_TOKEN_CONFIGURED == 'true'
        uses: actions/configure-pages@v6
        with:
          token: ${{ secrets.PAGES_TOKEN }}
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
